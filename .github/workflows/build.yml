name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip python3-dev build-essential \
            git openjdk-17-jdk unzip zip \
            libffi-dev libssl-dev autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake

      - name: Instalar Python deps
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer==1.5.0 cython==0.29.33

      - name: Aceptar licencias Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > ~/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license
          yes | sudo $(which sdkmanager) --licenses 2>/dev/null || true

      - name: Cache buildozer
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Compilar APK
        env:
          ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
        run: |
          yes | buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v3
        with:
          name: calcsys-apk
          path: bin/*.apk
          retention-days: 30
