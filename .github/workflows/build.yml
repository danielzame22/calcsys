name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git unzip zip \
            libffi-dev libssl-dev autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake openjdk-17-jdk

      - name: Instalar buildozer y cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Preparar Android SDK en ruta que espera buildozer
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          TOOLS_DIR=$SDK_DIR/cmdline-tools/latest
          mkdir -p $TOOLS_DIR
          mkdir -p $SDK_DIR/tools/bin

          # Descargar command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d /tmp/cmdtools
          cp -r /tmp/cmdtools/cmdline-tools/* $TOOLS_DIR/

          # Crear symlink donde buildozer busca sdkmanager
          ln -sf $TOOLS_DIR/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager

          # Aceptar licencias e instalar plataformas
          export PATH=$PATH:$TOOLS_DIR/bin
          yes | sdkmanager --sdk_root=$SDK_DIR --licenses
          sdkmanager --sdk_root=$SDK_DIR "platform-tools" "platforms;android-33" "build-tools;33.0.2"

          # Crear licencias también en formato que p4a espera
          mkdir -p $SDK_DIR/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_DIR/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $SDK_DIR/licenses/android-sdk-preview-license

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Compilar APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: calcsys-apk
          path: bin/*.apk
          retention-days: 30
